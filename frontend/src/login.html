<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - UCOB</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">UC<span>OB</span></a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-5">
            <div class="card gsap-reveal border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <h2 class="text-center mb-4 text-primary">Welcome Back</h2>

                <div id="alert-container"></div>

                <form id="login-form">
                  <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com" />
                  </div>

                  <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      required
                      placeholder="Enter your password"
                    />
                  </div>

                  <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Log In</button>

                  <p class="text-center text-muted mb-0">
                    Don't have an account? <a href="register.html" class="text-decoration-none">Sign up</a>
                  </p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0 small">&copy; 2024 UCOB Platform. All rights reserved.</p>
      </div>
    </footer>
    <script src="js/login.js" type="module"></script>
    <script type="module">
      import { gsapAnimReveal } from "./js/utils.js";

      document.addEventListener("DOMContentLoaded", () => gsapAnimReveal());
    </script>
  </body>
</html>
