<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - UCOB</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body class="bg-light d-flex flex-column min-vh-100">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-white sticky-top">
      <div class="container">
        <a class="navbar-brand" href="index.html">UC<span>OB</span></a>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 d-flex align-items-center py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-5">
            <div class="card gsap-reveal border-0 shadow-sm">
              <div class="card-body p-4 p-md-5">
                <h2 class="text-center mb-4 text-primary">Welcome Back</h2>

                <div id="alert-container"></div>

                <form id="login-form">
                  <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" class="form-control" id="email" required placeholder="name@example.com" />
                  </div>

                  <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input
                      type="password"
                      class="form-control"
                      id="password"
                      required
                      placeholder="Enter your password"
                    />
                  </div>

                  <button type="submit" class="btn btn-primary w-100 py-2 mb-3">Log In</button>

                  <p class="text-center text-muted mb-0">
                    Don't have an account? <a href="register.html" class="text-decoration-none">Sign up</a>
                  </p>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-3 mt-auto">
      <div class="container text-center">
        <p class="mb-0 small">&copy; 2024 UCOB Platform. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Custom JS -->
    <script src="./assets/js/main.js"></script>
    <script>
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const alertContainer = document.getElementById('alert-container');
        const submitBtn = e.target.querySelector('button[type="submit"]');

        // Clear previous alerts
        alertContainer.innerHTML = '';

        try {
          submitBtn.disabled = true;
          submitBtn.innerHTML =
            '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Logging in...';

          const response = await fetch(`${API_BASE_URL}/auth/login`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Accept: 'application/json',
            },
            body: JSON.stringify({
              email: email,
              password: password,
            }),
          });

          const data = await response.json();

          if (response.ok && data.success) {
            alertContainer.innerHTML = '<div class="alert alert-success">Login successful! Redirecting...</div>';

            setTimeout(() => {
              const userRole = data.data.role;

              window.location.href = 'dashboard.html';
            }, 1000);
          } else {
            alertContainer.innerHTML = `<div class="alert alert-danger">${data.error?.message || 'Login failed. Please check your credentials.'}</div>`;
          }
        } catch (error) {
          console.error('Login error:', error);
          alertContainer.innerHTML =
            '<div class="alert alert-danger">An unexpected error occurred. Check if the server is running.</div>';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Log In';
        }
      });
    </script>
  </body>
</html>
