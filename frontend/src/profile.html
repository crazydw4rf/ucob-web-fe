<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - UCOB</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" />

    <!-- Custom CSS -->
    <link href="css/style.css" rel="stylesheet" />
  </head>
  <body class="d-flex flex-column min-vh-100 bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm">
      <div class="container">
        <a class="navbar-brand" href="index.html">UC<span>OB</span></a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto align-items-center">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="about.html">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="profile.html">Profile</a>
            </li>
            <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
              <a class="btn btn-primary px-4" href="dashboard.html">Dashboard</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow-1 py-5">
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-md-8 col-lg-6">
            <div class="card border-0 shadow-sm gsap-reveal">
              <div class="card-header bg-white text-center py-4 border-bottom-0">
                <i class="bi bi-person-circle text-secondary" style="font-size: 5rem"></i>
                <h2 class="mt-3 mb-0" id="profile-name">Loading...</h2>
                <span class="badge bg-primary mt-2" id="profile-role">USER</span>
              </div>
              <div class="card-body px-4 px-md-5 pb-5">
                <h5 class="text-muted border-bottom pb-2 mb-4">Account Details</h5>

                <div class="mb-3">
                  <label class="form-label text-muted small fw-bold text-uppercase">First Name</label>
                  <div class="fs-5" id="profile-first-name">-</div>
                </div>

                <div class="mb-3">
                  <label class="form-label text-muted small fw-bold text-uppercase">Last Name</label>
                  <div class="fs-5" id="profile-last-name">-</div>
                </div>

                <div class="mb-4">
                  <label class="form-label text-muted small fw-bold text-uppercase">Email Address</label>
                  <div class="fs-5" id="profile-email">-</div>
                </div>

                <div class="d-grid gap-2 mt-5">
                  <button class="btn btn-outline-danger btn-logout">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white py-4 mt-auto">
      <div class="container text-center">
        <p class="mb-0">&copy; 2024 UCOB Platform. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <script type="module" src="./js/profile.js"></script>
    <script type="module">
      import { gsapAnimReveal } from "./js/utils.js";

      document.addEventListener("DOMContentLoaded", () => gsapAnimReveal());
    </script>
  </body>
</html>
