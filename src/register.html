<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container page-shell min-vh-100 d-flex flex-column">
      <div class="page-title">Register</div>
      <div class="page-frame flex-grow-1 d-flex flex-column">
        <nav class="navbar navbar-expand-lg nav-theme px-3 py-2">
          <div class="container-fluid px-0">
            <a class="navbar-brand brand-pill" href="index.html">UCOB</a>
            <button
              class="navbar-toggler border-0 shadow-none"
              type="button"
              data-bs-toggle="collapse"
              data-bs-target="#navbarMain"
              aria-controls="navbarMain"
              aria-expanded="false"
              aria-label="Toggle navigation"
            >
              <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
              <ul class="navbar-nav ms-auto gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="catalog.html">Catalog</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
                <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
              </ul>
            </div>
          </div>
        </nav>
        <div class="page-content p-3 p-lg-4 p-xl-5 flex-grow-1 d-flex flex-column">
          <div class="row g-4 flex-grow-1">
            <div class="col-lg-5 d-flex flex-column">
              <div class="card-soft p-4 flex-grow-1 d-flex flex-column">
                <div>
                  <span class="small-pill mb-3">Register</span>
                  <h3 class="fw-bold mb-3">Daftar Akun</h3>
                  <form>
                    <div class="mb-3">
                      <label class="form-label form-label-strong">Nama Depan</label>
                      <input type="text" class="form-control soft-input" placeholder="masukkan nama depan" />
                    </div>
                    <div class="mb-3">
                      <label class="form-label form-label-strong">Nama Belakang</label>
                      <input type="text" class="form-control soft-input" placeholder="masukkan nama belakang" />
                    </div>
                    <div class="mb-3">
                      <label class="form-label form-label-strong">Email</label>
                      <input type="email" class="form-control soft-input" placeholder="masukkan email" />
                    </div>
                    <div class="mb-3">
                      <label class="form-label form-label-strong">Password</label>
                      <input type="password" class="form-control soft-input" placeholder="masukkan password" />
                    </div>
                    <button type="submit" class="btn-register btn btn-brand w-50 mt-3">DAFTAR</button>
                  </form>
                </div>
                <div class="mt-auto pt-3">
                  <div class="login-note">
                    Sudah punya akun?
                    <a href="login.html" class="text-decoration-underline fw-bold text-dark">klik disini untuk login</a>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
        <!-- <div class="page-bar"></div> -->
      </div>
      <!-- <div class="text-center footer-note mt-2">Website Pengelolaan Minyak Bekas • Bootstrap 5</div> -->
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="text/javascript">
      const btnRegister = document.querySelector('.btn-register');
      btnRegister.addEventListener('click', (e) => {
        e.preventDefault();
        console.log('Register button clicked');
      });
    </script>
  </body>
</html>
